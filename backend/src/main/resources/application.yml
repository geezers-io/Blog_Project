server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/blogdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: always

app:
  jwt:
    secret: blog-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
    expiration: 86400000

  cors:
    allowed-origins: http://localhost:3000
